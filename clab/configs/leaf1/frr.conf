frr defaults datacenter
hostname leaf1
!
interface eth1
 description "TO_SPINE1_ETH1"
 ip address 10.0.0.1/31
exit
!
interface eth2
 description "TO_SPINE2_ETH1"
 ip address 10.0.0.5/31
exit
!
interface eth3
 description "TO_HOST1_ETH1"
 ip address 10.1.1.1/24
exit
!
interface lo
 ip address 10.255.0.11/32
exit
!
router bgp 65011
 bgp router-id 10.255.0.11
 no bgp ebgp-requires-policy
 bgp bestpath as-path multipath-relax
 neighbor 10.0.0.0 remote-as 65001
 neighbor 10.0.0.0 description spine1
 neighbor 10.0.0.4 remote-as 65002
 neighbor 10.0.0.4 description spine2
 !
 address-family ipv4 unicast
  network 10.1.1.0/24
  network 10.255.0.11/32
  neighbor 10.0.0.0 activate
  neighbor 10.0.0.4 activate
 exit-address-family
