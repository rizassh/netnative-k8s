frr defaults datacenter
hostname leaf2

interface lo
 ip address 10.255.0.12/32

interface eth1
 description "TO_SPINE1_ETH2"
 ip address 10.0.0.3/31

interface eth2
 description "TO_SPINE2_ETH2"
 ip address 10.0.0.7/31

interface eth3
 description "TO_HOST2_ETH1"
 ip address 10.1.2.1/24

router bgp 65012
 bgp router-id 10.255.0.12
 no bgp ebgp-requires-policy
 bgp bestpath as-path multipath-relax
 neighbor 10.0.0.2 remote-as 65001
 neighbor 10.0.0.2 description spine1
 neighbor 10.0.0.6 remote-as 65002
 neighbor 10.0.0.6 description spine2
 !
 address-family ipv4 unicast
  network 10.255.0.12/32
  network 10.1.2.0/24
  neighbor 10.0.0.2 activate
  neighbor 10.0.0.6 activate
 exit-address-family
!
